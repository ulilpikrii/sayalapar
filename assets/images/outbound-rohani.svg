<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bgR)"/>
  
  <!-- Zen stones and reflection -->
  <g transform="translate(300, 250)">
    <!-- Stones -->
    <ellipse cx="0" cy="30" rx="80" ry="25" fill="#64748B"/>
    <ellipse cx="0" cy="10" rx="55" ry="20" fill="#94A3B8"/>
    <ellipse cx="0" cy="-8" rx="35" ry="15" fill="#CBD5E1"/>
    
    <!-- Leaf -->
    <path d="M20 -20 Q40 -50 60 -30 Q40 -10 20 -20 Z" fill="#10B981" opacity="0.8"/>
  </g>
  
  <!-- Glowing aura behind stones -->
  <circle cx="300" cy="220" r="100" fill="#FFFFFF" opacity="0.4" filter="blur(10px)"/>
</svg>
