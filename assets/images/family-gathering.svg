<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgFG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DCFCE7"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <filter id="shadowFG">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bgFG)"/>
  
  <!-- Abstract Family/Community Circles -->
  <g filter="url(#shadowFG)" transform="translate(300, 220)">
    <!-- Main figures (dots + semi-circles) -->
    <g transform="translate(-80, 0)">
      <circle cx="0" cy="-60" r="25" fill="#F87171"/>
      <path d="M-40 20 A40 40 0 0 1 40 20 L40 60 L-40 60 Z" fill="#F87171"/>
    </g>
    
    <g transform="translate(80, 0)">
      <circle cx="0" cy="-50" r="20" fill="#60A5FA"/>
      <path d="M-30 30 A30 30 0 0 1 30 30 L30 60 L-30 60 Z" fill="#60A5FA"/>
    </g>
    
    <g transform="translate(0, 20)">
      <circle cx="0" cy="-40" r="15" fill="#FBBF24"/>
      <path d="M-25 20 A25 25 0 0 1 25 20 L25 40 L-25 40 Z" fill="#FBBF24"/>
    </g>
  </g>

  <!-- Sun -->
  <circle cx="500" cy="80" r="40" fill="#FEF08A" filter="url(#shadowFG)"/>
</svg>
