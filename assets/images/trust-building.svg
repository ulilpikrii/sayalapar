<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgTB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <filter id="shadowTB" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="6" stdDeviation="5" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bgTB)"/>
  
  <!-- Bridge / Handshake Concept -->
  <g filter="url(#shadowTB)">
    <!-- Left Hand / Piece -->
    <path d="M50 200 C 150 200, 200 150, 280 200 L 280 250 C 200 200, 150 250, 50 250 Z" fill="#38BDF8"/>
    <!-- Right Hand / Piece -->
    <path d="M550 200 C 450 200, 400 250, 320 200 L 320 250 C 400 280, 450 250, 550 250 Z" fill="#0369A1"/>
    
    <!-- Central connecting piece representing trust -->
    <circle cx="300" cy="180" r="30" fill="#FDE047"/>
    <polygon points="300,210 280,250 320,250" fill="#FDE047"/>
  </g>
  
  <!-- Decorative particles -->
  <circle cx="150" cy="100" r="8" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="450" cy="300" r="15" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="480" cy="120" r="6" fill="#FFFFFF" opacity="0.5"/>
</svg>
