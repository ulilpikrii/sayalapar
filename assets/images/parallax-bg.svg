<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <linearGradient id="bgP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#475569" stroke-width="0.5" stroke-opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#bgP)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  
  <!-- Diagonal dynamic shapes -->
  <path d="M0 1080 L600 0 L800 0 L200 1080 Z" fill="#38BDF8" opacity="0.1"/>
  <path d="M1000 1080 L1600 0 L1920 0 L1920 1080 L1300 1080 Z" fill="#94A3B8" opacity="0.05"/>
  <path d="M300 1080 L1000 0 L1050 0 L350 1080 Z" fill="#E2E8F0" opacity="0.1"/>

  <!-- Geometric Accents (Safety theme abstract) -->
  <circle cx="1600" cy="200" r="100" fill="none" stroke="#64748B" stroke-width="10" stroke-opacity="0.3"/>
  <circle cx="1600" cy="200" r="60" fill="none" stroke="#38BDF8" stroke-width="4" stroke-opacity="0.4"/>
  <polygon points="200,200 250,300 150,300" fill="none" stroke="#64748B" stroke-width="4" stroke-opacity="0.4"/>
</svg>
