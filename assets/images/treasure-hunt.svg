<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  
  <!-- Map Base -->
  <path d="M100 80 Q300 40 500 80 L500 320 Q300 280 100 320 Z" fill="#FFFFFF" filter="url(#shadow)"/>
  <path d="M100 80 Q300 40 500 80 L500 320 Q300 280 100 320 Z" fill="none" stroke="#B45309" stroke-width="4" stroke-dasharray="10 10"/>
  
  <!-- Path Line -->
  <path d="M150 250 Q250 150 350 250 T450 150" fill="none" stroke="#DC2626" stroke-width="4" stroke-dasharray="8 8"/>
  
  <!-- Target Pin -->
  <g transform="translate(450, 150)" filter="url(#shadow)">
    <path d="M0 0 C-15 -20 -25 -35 -25 -50 A25 25 0 1 1 25 -50 C25 -35 15 -20 0 0 Z" fill="#DC2626"/>
    <circle cx="0" cy="-50" r="10" fill="#FFFFFF"/>
  </g>
  
  <!-- Compas -->
  <g transform="translate(180, 120)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#B45309" stroke-width="3"/>
    <polygon points="0,-25 8,0 0,25 -8,0" fill="#DC2626"/>
  </g>
</svg>
